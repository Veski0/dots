set -g @plugin 'tmux-plugins/tpm' # mandatory
set -g @plugin 'tmux-plugins/tmux-sensible' # optional recommended

# Plugins.
set -g @plugin 'o0th/tmux-nova'
set -g @plugin 'tmux-plugins/tmux-cpu'
# set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'ofirgall/tmux-keyboard-layout'
set -g @plugin 'tmux-plugins/tmux-yank'

# Theme.
set -g @nova-nerdfonts true
set -g @nova-nerdfonts-left 
set -g @nova-nerdfonts-right 

set -g @nova-pane "#I #W"
set -g @nova-rows 0

# Colors — load the active theme (dark by default).
# Toggle with: prefix + T
if-shell '[ -f ~/.tmux/.theme ] && [ "$(cat ~/.tmux/.theme)" = "light" ]' \
    'source-file ~/.tmux/colors-light.conf' \
    'source-file ~/.tmux/colors-dark.conf'

# Status bar.
set -g @nova-segment-prefix "#{?client_prefix,PREFIX,}"

set -g @nova-segment-session "#{session_name}"

set -g @nova-segment-whoami "#(whoami)@#h"

set -g @nova-segment-cpu "CPU: #(~/.tmux/plugins/tmux-cpu/scripts/cpu_percentage.sh) RAM: #(~/.tmux/plugins/tmux-cpu/scripts/ram_percentage.sh)"

# set -g @batt_icon_status_charging '↑'
# set -g @batt_icon_status_discharging '↓'
# set -g @nova-segment-battery "#{battery_icon_status} #{battery_percentage}"

set -g @nova-segment-layout "#(~/.tmux/plugins/tmux-keyboard-layout/scripts/get_keyboard_layout.sh)"

set -g @nova-segments-0-left "session"
# set -g @nova-segments-0-right "prefix cpu battery layout whoami"
set -g @nova-segments-0-right "prefix cpu layout whoami"

# Theme toggle.
bind T run-shell "~/.tmux/scripts/toggle-theme.sh"

# Rebind to the GNU Screen default.
unbind C-b
set -g prefix §

# Initialize TMUX plugin manager.
run '~/.tmux/plugins/tpm/tpm'

setw -g mode-keys vi
set -g mouse on
